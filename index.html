<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>城市美食地图</title>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://tile.openstreetmap.org">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --ink: #20201d;
      --muted: #69645c;
      --line: #ded8ce;
      --paper: #fffaf1;
      --panel: #fffdf8;
      --accent: #c9492f;
      --accent-dark: #8f2f22;
      --fresh: #27855f;
      --blue: #276f9f;
      --pizza: #a33f7b;
      --shadow: 0 18px 45px rgba(65, 44, 22, .15);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", system-ui, sans-serif;
      background: #efe7d8;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(340px, 450px) minmax(0, 1fr);
      height: 100vh;
      min-height: 620px;
      overflow: hidden;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      background: var(--paper);
      border-right: 1px solid var(--line);
      box-shadow: var(--shadow);
      z-index: 500;
    }

    .header {
      padding: 24px 24px 18px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent-dark);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 36px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(86px, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .metric {
      min-width: 0;
      padding: 10px 12px;
      border: 1px solid #e5dbcd;
      border-radius: 8px;
      background: #fff6e8;
    }

    .metric strong {
      display: block;
      font-size: 20px;
      line-height: 1.1;
    }

    .metric span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .controls {
      display: grid;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 250, 241, .92);
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .search-box {
      position: relative;
    }

    .search-box i {
      position: absolute;
      left: 12px;
      top: 50%;
      width: 18px;
      height: 18px;
      color: #8c8173;
      transform: translateY(-50%);
      pointer-events: none;
    }

    input[type="search"] {
      width: 100%;
      min-height: 42px;
      padding: 0 12px 0 40px;
      border: 1px solid #d6ccbe;
      border-radius: 8px;
      color: var(--ink);
      background: var(--panel);
      outline: none;
    }

    input[type="search"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201, 73, 47, .16);
    }

    .icon-button {
      display: inline-grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 1px solid #d6ccbe;
      border-radius: 8px;
      color: var(--accent-dark);
      background: var(--panel);
      cursor: pointer;
    }

    .icon-button:hover,
    .icon-button:focus-visible {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 3px rgba(201, 73, 47, .14);
    }

    .icon-button i,
    .link-button i {
      width: 18px;
      height: 18px;
    }

    .city-tabs,
    .group-tabs,
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .city-tab,
    .group-tab,
    .filter {
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid #d6ccbe;
      border-radius: 999px;
      color: #4e4740;
      font-size: 13px;
      font-weight: 700;
      background: var(--panel);
      cursor: pointer;
    }

    .city-tab[aria-pressed="true"],
    .group-tab[aria-pressed="true"],
    .filter[aria-pressed="true"] {
      border-color: var(--accent);
      color: #fff;
      background: var(--accent);
    }

    .list {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 14px 18px 10px;
    }

    .empty {
      display: none;
      margin: 14px 18px;
      padding: 18px;
      border: 1px dashed #d6ccbe;
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255, 255, 255, .44);
    }

    .place-card {
      width: 100%;
      margin: 0 0 12px;
      padding: 16px;
      border: 1px solid #e0d6c7;
      border-radius: 8px;
      text-align: left;
      color: inherit;
      background: var(--panel);
      cursor: pointer;
      transition: border-color .16s ease, transform .16s ease, box-shadow .16s ease;
    }

    .place-card:hover,
    .place-card:focus-visible,
    .place-card.active {
      border-color: rgba(201, 73, 47, .75);
      box-shadow: 0 12px 28px rgba(68, 44, 23, .12);
      outline: none;
      transform: translateY(-1px);
    }

    .card-top {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 10px;
      min-width: 0;
    }

    .card-top h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .price {
      justify-self: end;
      max-width: 150px;
      padding: 5px 8px;
      border-radius: 7px;
      color: var(--accent-dark);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
      text-align: right;
      background: #fde6d7;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 10px 0;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      color: #325d4e;
      font-size: 12px;
      font-weight: 700;
      background: #e7f3eb;
    }

    .tag.group {
      color: #7b245a;
      background: #f3e1ed;
    }

    .tag.area {
      color: #225372;
      background: #e1f0f8;
    }

    .desc {
      margin: 0;
      color: #4b463f;
      font-size: 14px;
      line-height: 1.55;
    }

    .address {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 7px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .address i {
      width: 16px;
      height: 16px;
      margin-top: 1px;
      color: var(--accent);
    }

    .status-line,
    .footnote {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .status-line {
      padding: 0 18px 8px;
      font-weight: 700;
    }

    .footnote {
      margin: 0;
      padding: 0 18px 18px;
    }

    .map-wrap {
      position: relative;
      height: 100vh;
      min-width: 0;
      background: #d9e2df;
    }

    #map {
      width: 100%;
      height: 100%;
      min-height: 620px;
      z-index: 1;
    }

    .map-badge {
      position: absolute;
      left: 18px;
      top: 18px;
      z-index: 450;
      max-width: min(520px, calc(100% - 36px));
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, .64);
      border-radius: 8px;
      background: rgba(255, 253, 248, .94);
      box-shadow: 0 14px 34px rgba(30, 30, 30, .14);
      backdrop-filter: blur(10px);
    }

    .map-badge strong {
      display: block;
      font-size: 15px;
      line-height: 1.3;
    }

    .map-badge span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 8px;
    }

    .popup {
      width: min(290px, 72vw);
    }

    .popup h3 {
      margin: 0 0 8px;
      font-size: 17px;
      line-height: 1.25;
    }

    .popup p {
      margin: 6px 0;
      color: #4f4942;
      font-size: 13px;
      line-height: 1.45;
    }

    .popup .popup-price {
      display: inline-flex;
      margin-top: 8px;
      padding: 5px 8px;
      border-radius: 7px;
      color: var(--accent-dark);
      font-size: 12px;
      font-weight: 800;
      background: #fde6d7;
    }

    .popup-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 36px;
      padding: 0 10px;
      border: 1px solid #d6ccbe;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
      background: var(--accent);
    }

    .link-button.secondary {
      color: var(--accent-dark);
      background: #fffaf1;
    }

    .marker {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 3px solid #fff;
      border-radius: 50% 50% 50% 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      background: var(--fresh);
      box-shadow: 0 8px 18px rgba(42, 33, 24, .28);
      transform: rotate(-45deg);
    }

    .marker span {
      transform: rotate(45deg);
    }

    .marker.bread {
      background: var(--fresh);
    }

    .marker.pizza {
      background: var(--pizza);
    }

    .marker.paomo {
      background: var(--accent);
      font-size: 13px;
    }

    .marker.shengjian {
      background: var(--blue);
      font-size: 13px;
    }

    @media (max-width: 880px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(48vh, 1fr);
        height: auto;
        min-height: 100vh;
        overflow: visible;
      }

      .sidebar {
        max-height: none;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .header {
        padding: 20px 18px 14px;
      }

      .summary {
        grid-template-columns: repeat(3, 1fr);
      }

      .list {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding-bottom: 16px;
      }

      .place-card {
        flex: 0 0 min(310px, 86vw);
        margin-bottom: 0;
      }

      .map-wrap,
      #map {
        height: auto;
        min-height: 58vh;
      }

      .map-badge {
        top: auto;
        bottom: 18px;
      }
    }

    @media (max-width: 520px) {
      .summary {
        grid-template-columns: 1fr 1fr;
      }

      .card-top {
        grid-template-columns: 1fr;
      }

      .price {
        justify-self: start;
        max-width: 100%;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar" aria-label="城市美食清单">
      <section class="header">
        <p class="eyebrow">City Food Map</p>
        <h1>城市美食地图</h1>
        <div class="summary" aria-label="地图概览">
          <div class="metric">
            <strong id="shopCount">20</strong>
            <span>当前显示</span>
          </div>
          <div class="metric">
            <strong id="breadCount">8</strong>
            <span>面包</span>
          </div>
          <div class="metric">
            <strong id="pizzaCount">12</strong>
            <span>Pizza</span>
          </div>
          <div class="metric">
            <strong id="paomoCount">0</strong>
            <span>泡馍</span>
          </div>
          <div class="metric">
            <strong id="shengjianCount">0</strong>
            <span>生煎</span>
          </div>
        </div>
      </section>

      <section class="controls" aria-label="筛选">
        <div class="city-tabs" role="group" aria-label="按城市筛选">
          <button class="city-tab" type="button" data-city="macau" aria-pressed="true">澳门</button>
          <button class="city-tab" type="button" data-city="xian" aria-pressed="false">西安</button>
          <button class="city-tab" type="button" data-city="shanghai" aria-pressed="false">上海</button>
        </div>
        <div class="search-row">
          <label class="search-box">
            <i data-lucide="search" aria-hidden="true"></i>
            <input id="searchInput" type="search" placeholder="搜索店名、推荐、地址" autocomplete="off">
          </label>
          <button id="fitButton" class="icon-button" type="button" title="显示全部" aria-label="显示全部">
            <i data-lucide="scan-search" aria-hidden="true"></i>
          </button>
        </div>
        <div class="group-tabs" role="group" aria-label="按品类筛选">
          <button class="group-tab" type="button" data-group="all" aria-pressed="true">全部</button>
          <button class="group-tab" type="button" data-group="bread" aria-pressed="false">面包</button>
          <button class="group-tab" type="button" data-group="pizza" aria-pressed="false">Pizza</button>
          <button class="group-tab" type="button" data-group="paomo" aria-pressed="false">泡馍</button>
          <button class="group-tab" type="button" data-group="shengjian" aria-pressed="false">生煎</button>
        </div>
        <div class="filters" id="categoryFilters" role="group" aria-label="按类型筛选"></div>
      </section>

      <section class="list" id="placeList" aria-live="polite"></section>
      <p class="empty" id="emptyState">没有匹配的店铺。</p>
      <p class="status-line" id="limitStatus">当前显示：面包 8 家，Pizza 12 家，泡馍 0 家，生煎 0 家。每类最多显示 20 家。</p>
      <p class="footnote">价格为公开资料整理的参考价，现场价格和供应以门店为准。含“参考定位”的标记为按地址定位到楼宇或街区。</p>
    </aside>

    <section class="map-wrap" aria-label="城市美食地图">
      <div class="map-badge">
        <strong id="mapBadgeTitle">澳门面包与 Pizza 精选点</strong>
        <span id="mapBadgeSubtitle">每类最多显示 20 家，按推荐优先级排序。</span>
      </div>
      <div id="map"></div>
    </section>
  </main>

    const map = L.map("map", {
      zoomControl: true,
      scrollWheelZoom: true
    }).setView([22.175, 113.548], 13);

    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const listEl = document.getElementById("placeList");
    const emptyEl = document.getElementById("emptyState");
    const searchInput = document.getElementById("searchInput");
    const fitButton = document.getElementById("fitButton");
    const categoryFilters = document.getElementById("categoryFilters");
    const cityButtons = Array.from(document.querySelectorAll(".city-tab"));
    const groupButtons = Array.from(document.querySelectorAll(".group-tab"));
    const markers = new Map();
    let activeCity = "macau";
    let activeGroup = "all";
    let activeCategory = "all";
    let activeId = null;

    function refreshIcons() {
      if (window.lucide) {
        lucide.createIcons();
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function byRank(a, b) {
      if (placeCity(a) !== placeCity(b)) return placeCity(a).localeCompare(placeCity(b));
      if (a.group !== b.group) {
        return cityGroups[activeCity].indexOf(a.group) - cityGroups[activeCity].indexOf(b.group);
      }
      return a.rank - b.rank;
    }

    function placeCity(item) {
      return item.city || "macau";
    }

    function activeGroups() {
      return cityGroups[activeCity] || [];
    }

    function markerIcon(item) {
      const labels = {
        bread: "B",
        pizza: "P",
        paomo: "馍",
        shengjian: "煎"
      };
      const label = labels[item.group] || "?";
      return L.divIcon({
        className: "",
        html: `<div class="marker ${item.group}"><span>${label}</span></div>`,
        iconSize: [34, 34],
        iconAnchor: [17, 34],
        popupAnchor: [0, -30]
      });
    }

    function navUrl(item) {
      const query = encodeURIComponent(`${item.name} ${item.address} ${cityLabels[placeCity(item)]}`);
      return `https://www.google.com/maps/search/?api=1&query=${query}`;
    }

    function amapUrl(item) {
      const city = cityLabels[placeCity(item)];
      const keyword = encodeURIComponent(`${item.name} ${item.address} ${city}`);
      return `https://uri.amap.com/search?keyword=${keyword}&city=${encodeURIComponent(city)}`;
    }

    function sourceLink(item) {
      if (!item.sourceUrl) return "";
      return `<a class="link-button secondary" href="${item.sourceUrl}" target="_blank" rel="noreferrer">
        <i data-lucide="external-link" aria-hidden="true"></i>来源
      </a>`;
    }

    function popupHtml(item) {
      return `
        <div class="popup">
          <h3>${escapeHtml(item.name)}</h3>
          <p><strong>推荐：</strong>${escapeHtml(item.items)}</p>
          <p>${escapeHtml(item.description)}</p>
          <p><strong>地址：</strong>${escapeHtml(item.address)}</p>
          <p><strong>定位：</strong>${escapeHtml(item.accuracy)}</p>
          <span class="popup-price">${escapeHtml(item.price)}</span>
          <div class="popup-actions">
            <a class="link-button" href="${navUrl(item)}" target="_blank" rel="noreferrer">
              <i data-lucide="navigation" aria-hidden="true"></i>Google
            </a>
            <a class="link-button" href="${amapUrl(item)}" target="_blank" rel="noreferrer">
              <i data-lucide="route" aria-hidden="true"></i>高德
            </a>
            <a class="link-button secondary" href="https://www.openstreetmap.org/?mlat=${item.lat}&mlon=${item.lng}#map=18/${item.lat}/${item.lng}" target="_blank" rel="noreferrer">
              <i data-lucide="map-pin" aria-hidden="true"></i>OSM
            </a>
            ${sourceLink(item)}
          </div>
        </div>
      `;
    }

    function makeCard(item) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "place-card";
      button.dataset.id = item.id;
      button.innerHTML = `
        <div class="card-top">
          <h2>${escapeHtml(item.name)}</h2>
          <span class="price">${escapeHtml(item.price)}</span>
        </div>
        <div class="tag-row">
          <span class="tag group">${escapeHtml(groupLabels[item.group])}</span>
          <span class="tag">${escapeHtml(item.category)}</span>
          <span class="tag area">${escapeHtml(item.area)}</span>
          <span class="tag area">${escapeHtml(item.accuracy)}</span>
        </div>
        <p class="desc">${escapeHtml(item.items)}。${escapeHtml(item.description)}</p>
        <div class="address">
          <i data-lucide="map-pin" aria-hidden="true"></i>
          <span>${escapeHtml(item.address)}</span>
        </div>
      `;
      button.addEventListener("click", () => focusPlace(item.id, true));
      return button;
    }

    function focusPlace(id, pan) {
      activeId = id;
      const item = places.find((entry) => entry.id === id);
      const marker = markers.get(id);
      if (!item || !marker) return;

      document.querySelectorAll(".place-card").forEach((card) => {
        card.classList.toggle("active", card.dataset.id === id);
      });

      if (pan) {
        map.setView([item.lat, item.lng], 17, { animate: true });
      }
      marker.openPopup();
      requestAnimationFrame(refreshIcons);
    }

    function candidatePlaces() {
      const keyword = searchInput.value.trim().toLowerCase();
      return places.filter((item) => {
        const haystack = `${item.name} ${item.group} ${item.category} ${item.area} ${item.items} ${item.description} ${item.address} ${item.price}`.toLowerCase();
        const matchesCity = placeCity(item) === activeCity;
        const matchesGroup = activeGroup === "all" || item.group === activeGroup;
        const matchesCategory = activeCategory === "all" || item.category === activeCategory;
        const matchesKeyword = !keyword || haystack.includes(keyword);
        return matchesCity && matchesGroup && matchesCategory && matchesKeyword;
      }).sort(byRank);
    }

    function limitPlaces(items) {
      if (activeGroup !== "all") {
        return items.slice(0, MAX_PER_GROUP);
      }

      return activeGroups().flatMap((group) => {
        return items.filter((item) => item.group === group).slice(0, MAX_PER_GROUP);
      });
    }

    function visiblePlaces() {
      return limitPlaces(candidatePlaces());
    }

    function categoryOptions() {
      const cityPlaces = places.filter((item) => placeCity(item) === activeCity);
      const scope = activeGroup === "all" ? cityPlaces : cityPlaces.filter((item) => item.group === activeGroup);
      return Array.from(new Set(scope.map((item) => item.category)));
    }

    function renderGroupTabs() {
      const groups = activeGroups();
      groupButtons.forEach((button) => {
        const group = button.dataset.group;
        const available = group === "all" || groups.includes(group);
        button.hidden = !available;
        button.setAttribute("aria-pressed", String(group === activeGroup));
      });
    }

    function renderCategoryFilters() {
      const categories = categoryOptions();
      categoryFilters.innerHTML = "";

      const allButton = document.createElement("button");
      allButton.className = "filter";
      allButton.type = "button";
      allButton.dataset.category = "all";
      allButton.setAttribute("aria-pressed", String(activeCategory === "all"));
      allButton.textContent = "全部类型";
      categoryFilters.appendChild(allButton);

      categories.forEach((category) => {
        const button = document.createElement("button");
        button.className = "filter";
        button.type = "button";
        button.dataset.category = category;
        button.setAttribute("aria-pressed", String(activeCategory === category));
        button.textContent = category;
        categoryFilters.appendChild(button);
      });

      categoryFilters.querySelectorAll(".filter").forEach((button) => {
        button.addEventListener("click", () => {
          activeCategory = button.dataset.category;
          render();
        });
      });
    }

    function updateCounts(visible) {
      const breadCount = visible.filter((item) => item.group === "bread").length;
      const pizzaCount = visible.filter((item) => item.group === "pizza").length;
      const paomoCount = visible.filter((item) => item.group === "paomo").length;
      const shengjianCount = visible.filter((item) => item.group === "shengjian").length;
      document.getElementById("shopCount").textContent = visible.length;
      document.getElementById("breadCount").textContent = breadCount;
      document.getElementById("pizzaCount").textContent = pizzaCount;
      document.getElementById("paomoCount").textContent = paomoCount;
      document.getElementById("shengjianCount").textContent = shengjianCount;
      document.getElementById("limitStatus").textContent =
        `当前显示：面包 ${breadCount} 家，Pizza ${pizzaCount} 家，泡馍 ${paomoCount} 家，生煎 ${shengjianCount} 家。每类最多显示 ${MAX_PER_GROUP} 家。`;
    }

    function updateCityBadge() {
      const badge = cityBadges[activeCity];
      document.getElementById("mapBadgeTitle").textContent = badge.title;
      document.getElementById("mapBadgeSubtitle").textContent = badge.subtitle;
    }

    function render() {
      renderGroupTabs();
      renderCategoryFilters();
      updateCityBadge();
      const visible = visiblePlaces();
      const visibleIds = new Set(visible.map((item) => item.id));
      listEl.innerHTML = "";
      visible.forEach((item) => listEl.appendChild(makeCard(item)));
      emptyEl.style.display = visible.length ? "none" : "block";
      updateCounts(visible);

      markers.forEach((marker, id) => {
        const itemVisible = visibleIds.has(id);
        if (itemVisible && !map.hasLayer(marker)) marker.addTo(map);
        if (!itemVisible && map.hasLayer(marker)) marker.remove();
      });

      if (visible.length) {
        const bounds = L.latLngBounds(visible.map((item) => [item.lat, item.lng]));
        const isDefaultCityView = activeGroup === "all" && activeCategory === "all" && !searchInput.value.trim();
        if (isDefaultCityView) {
          const view = cityViews[activeCity];
          map.setView(view.center, view.zoom, { animate: false });
        } else {
          map.fitBounds(bounds, { padding: [42, 42], maxZoom: 15 });
        }
      }

      if (!visibleIds.has(activeId)) {
        activeId = null;
      }

      requestAnimationFrame(refreshIcons);
    }

    places.forEach((item) => {
      const marker = L.marker([item.lat, item.lng], { icon: markerIcon(item) })
        .bindPopup(popupHtml(item));
      marker.on("click", () => focusPlace(item.id, false));
      markers.set(item.id, marker);
      marker.addTo(map);
    });

    searchInput.addEventListener("input", render);

    cityButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeCity = button.dataset.city;
        activeGroup = "all";
        activeCategory = "all";
        searchInput.value = "";
        cityButtons.forEach((entry) => {
          entry.setAttribute("aria-pressed", String(entry === button));
        });
        render();
      });
    });

    groupButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeGroup = button.dataset.group;
        activeCategory = "all";
        render();
      });
    });

    fitButton.addEventListener("click", () => {
      searchInput.value = "";
      activeGroup = "all";
      activeCategory = "all";
      render();
    });

    render();
    window.addEventListener("load", () => {
      setTimeout(() => {
        map.invalidateSize();
        render();
      }, 250);
    });
  </script>
</body>
</html>
